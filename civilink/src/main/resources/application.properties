spring.application.name=civilink
server.port=10000

# Database Configuration - PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/civilink_bd}
spring.datasource.username=faiz2
spring.datasource.password=faiz3
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Configuration - Version control for database migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Security Configuration
app.security.token-secret=${TOKEN_SECRET:mySecureTokenSecret12345678901234567890}
app.security.access-token-expiration-seconds=${ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
app.security.refresh-token-expiration-seconds=${REFRESH_TOKEN_EXPIRATION_SECONDS:604800}

# CORS Configuration
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# File Upload
app.upload-dir=${UPLOAD_DIR:uploads}
