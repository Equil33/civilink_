spring.application.name=civilink
server.port=10000

# Database Configuration - PostgreSQL sur Railway
spring.datasource.url=jdbc:postgresql://<RAILWAY_HOST>:<PORT>/<DB_NAME>
spring.datasource.username=<RAILWAY_USERNAME>
spring.datasource.password=<RAILWAY_PASSWORD>
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Configuration - Version control for database migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Security Configuration
app.security.token-secret=mySecureTokenSecret12345678901234567890
app.security.access-token-expiration-seconds=3600
app.security.refresh-token-expiration-seconds=604800

# CORS Configuration
app.cors.allowed-origins=http://localhost:*,http://127.0.0.1:*

# File Upload
app.upload-dir=uploads